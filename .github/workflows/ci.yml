name: CI
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v7
        with:
          python-version: 3.14
          cache: 'pip'
      - name: Install dependencies
        run: pip install .[lint]
      - name: Style check with black
        run: black . --check
      - name: Lint with ruff
        run: ruff .
      - name: Type check with mypy
        run: mypy

